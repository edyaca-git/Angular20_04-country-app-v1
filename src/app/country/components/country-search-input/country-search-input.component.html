 <section class="flex flex-row gap-2 mt-2">
    <!-- como no vamos a evaluar el valor de #txtSearch y ssolo queremos emitir el valor cuando el 
     usuario presione Enter NO usamos un metodo o funcion-
     value es un output de tipo string que se declaro en el componente que va a recibir el valor mismo 
     que va a enviarse al componente padre -->
    <input type="text" class="input input-bordered m2-2 w-56" 
           [placeholder]="placeholder()" 
           autofocus 
           #txtSearch           
           (keyup.enter)="value.emit(txtSearch.value)"
    />

    <button class="btn btn-primary" 
         (click)="value.emit(txtSearch.value)">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
            <path fill="none" stroke="currentColor" d="M18.425 18.425L23.5 23.5m-12.5-2C5.201 21.5.5 16.799.5 11S5.201.5 11 .5S21.5 5.201 21.5 11S16.799 21.5 11 21.5Z" stroke-width="1"
            />
        </svg>
        Buscar
 
    </button>

 </section>
